<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <header class="page-header">
            <h1>Food Calculator</h1>
        </header>

        <main class="page-content">

            <!-- 🌟 Wochenplan -->
            <section id="meal-plan">

<div class="meal-plan-topbar">
    <div class="meal-plan-title-group">
        <h2>Wochenplan</h2>
        <p id="current-plan-name" class="left-align">Kein Plan geladen</p>
    </div>

    <div class="meal-plan-toolbar">
        <input type="text" id="plan-name" placeholder="Neuen Plan speichern als ...">

        <select id="plan-list"></select>

        <button type="button" onclick="saveMealPlan()">Speichern</button>
        <button type="button" onclick="loadMealPlan()">Laden</button>
        <button type="button" onclick="updateMealPlan()">Aktualisieren</button>
        <button type="button" class="icon-button plan-delete-button" onclick="deleteMealPlan()">🗑️</button>
    </div>
</div>

<div class="weekly-plan-board" id="meal-table"></div>

<div id="day-detail-panel" class="day-detail-panel"></div>

</section>

            <div class="plan-and-recipe-container">

    <section id="add-recipe" class="section-card">
        <div class="section-block">
            <p class="small-title">Rezept hinzufügen</p>

            <div class="recipe-inputs">
                <input type="text" id="recipe-name" placeholder="Rezeptname">
                <input type="number" id="recipe-calories" placeholder="Kalorien">
            </div>

            <div class="recipe-checkboxes">
                <label><input type="checkbox" value="breakfast"> Frühstück</label>
                <label><input type="checkbox" value="lunch"> Mittagessen</label>
                <label><input type="checkbox" value="dinner"> Abendessen</label>
                <label><input type="checkbox" value="snack"> Snack</label>
            </div>

            <button type="button" onclick="addRecipe()">Rezept hinzufügen</button>
        </div>
    </section>

</div>

            <!-- 🌟 Rezeptbuch -->
            <section class="recipe-book-box section-card">

                <div id="recipe-book">
                    <div class="section-header">
                        <h2>Rezeptbuch</h2>
                    </div>

                    <ul id="recipe-list">
                        <!-- Wird dynamisch gefüllt -->
                    </ul>
                </div>

            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
