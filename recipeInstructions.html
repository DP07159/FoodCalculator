<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochanleitung</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f7fb">
</head>
<body>
    <header class="app-header">
        <div class="app-header-inner">
            <button id="burger-button" class="burger-button" type="button" aria-label="Menü öffnen">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                </span>
            </button>

            <div class="app-header-title">Food Calculator</div>

            <div id="burger-dropdown" class="burger-dropdown is-hidden">
                <a href="/index.html">Startseite</a>
                <a href="/recipeCreate.html">Neues Rezept</a>
                <a href="/index.html#recipe-book">Rezeptbuch</a>
                <a href="/index.html#meal-plan">Wochenplan</a>
            </div>
        </div>
    </header>

    <div class="container">
<main class="page-content recipe-instructions-page">
            <header class="header-container recipe-hero">
                <div class="recipe-info">
                    <p class="recipe-kicker">Rezept</p>
                    <h1 id="display-recipe-name"></h1>
                </div>
                <div class="recipe-header-actions">
                    <div class="recipe-stat"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/></svg></span><span id="display-recipe-portions"></span></div>
                    <div class="recipe-stat"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 22c4 0 7-3 7-7 0-3-2-5-4-7 .2 2-1 3.5-2.2 4.2C13 9 11 6 8 4c.4 4-3 6-3 11 0 4 3 7 7 7z"/></svg></span><span id="display-recipe-calories"></span></div>
                    <button type="button" id="favorite-recipe-button" class="header-icon-button favorite-header-button" title="Als Favorit markieren" aria-label="Als Favorit markieren"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></span></button>
                    <button type="button" id="share-ingredients-button" class="header-icon-button" title="Zutatenliste teilen" aria-label="Zutatenliste teilen"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M5 14v5h14v-5"/></svg></span></button>
                    <button type="button" id="edit-recipe-button" class="header-icon-button" title="Rezept bearbeiten" aria-label="Rezept bearbeiten"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16v4z"/><path d="M13.5 6.5l4 4"/></svg></span></button>
                </div>
            </header>

            <section class="content-section ingredients-content-section">
                <h2>Zutaten</h2>
                <ul id="display-recipe-ingredients"></ul>
            </section>

            <section class="content-section instructions-content-section">
                <h2>Anleitung</h2>
                <div id="display-recipe-instructions"></div>
            </section>
        </main>
    
    </div>

    <div id="app-toast" class="app-toast is-hidden"></div>
    <script src="navigation.js"></script>
    <script src="recipeInstructions.js"></script>
</body>
</html>
