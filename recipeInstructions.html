<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochanleitung</title>
    <link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5f7fb">
</head>
<body>
    <div class="container">

        <div class="burger-menu">
            <button id="burger-button" class="burger-button" type="button" aria-label="Menü öffnen">
                ☰
            </button>

            <div id="burger-dropdown" class="burger-dropdown is-hidden">
                <a href="/index.html">Startseite</a>
                <a href="/recipeCreate.html">Neues Rezept</a>
                <a href="/index.html#recipe-book">Rezeptbuch</a>
                <a href="/index.html#meal-plan">Wochenplan</a>
            </div>
        </div>

        <main class="page-content recipe-instructions-page">

            <header class="header-container">
                <div class="recipe-info">
                    <h2 id="display-recipe-name"></h2>
                </div>

                <div>🍽️ <span id="display-recipe-portions"></span></div>
                    <div>🍫 <span id="display-recipe-calories"></span></div>

                    <button
                        type="button"
                        id="share-ingredients-button"
                        class="header-icon-button"
                        title="Zutatenliste teilen"
                        aria-label="Zutatenliste teilen">
                        ↗
                    </button>

                    <button
                        type="button"
                        id="edit-recipe-button"
                        class="header-icon-button"
                        title="Rezept bearbeiten"
                        aria-label="Rezept bearbeiten">
                        ✎
                    </button>

<button
    type="button"
    id="add-to-plan-toggle-button"
    class="header-icon-button"
    title="Zum Wochenplan hinzufügen"
    aria-label="Zum Wochenplan hinzufügen">
    ＋
</button>
                </div>
            </header>

<section id="add-to-plan-panel" class="add-to-plan-panel is-hidden">
    <select id="add-to-plan-day">
        <option value="">Tag auswählen</option>
        <option value="Montag">Montag</option>
        <option value="Dienstag">Dienstag</option>
        <option value="Mittwoch">Mittwoch</option>
        <option value="Donnerstag">Donnerstag</option>
        <option value="Freitag">Freitag</option>
        <option value="Samstag">Samstag</option>
        <option value="Sonntag">Sonntag</option>
    </select>

    <select id="add-to-plan-meal">
        <option value="">Mahlzeit auswählen</option>
        <option value="breakfast">Frühstück</option>
        <option value="lunch">Mittagessen</option>
        <option value="dinner">Abendessen</option>
        <option value="snack">Snack</option>
    </select>

    <button type="button" id="add-to-plan-confirm-button">
        In Wochenplan übernehmen
    </button>
</section>

            <section class="content-section ingredients-content-section">
                <div class="ingredients-section-header">
                    <h3>Zutaten</h3>
                </div>

                <ul id="display-recipe-ingredients"></ul>
            </section>

            <section class="content-section">
                <h3>Anleitung</h3>
                <div id="display-recipe-instructions"></div>
            </section>

        </main>
    </div>

    <script src="navigation.js"></script>
    <script src="recipeInstructions.js"></script>
</body>
</html>
