<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f7fb">
</head>
<body>
    <header class="app-header">
        <button id="burger-button" class="burger-button" type="button" aria-label="Menü öffnen">
            <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
        <div class="app-header-title">Food Calculator</div>
        <div id="burger-dropdown" class="burger-dropdown is-hidden"></div>
    </header>

    <div class="container">
        <main class="page-content inventory-page">
            <header class="page-header inventory-header">
                <p class="recipe-kicker">Bestand</p>
                <h1>Inventar</h1>
            </header>

            <section class="section-card inventory-list-card">
                <div class="recipe-book-topbar inventory-list-topbar">
                    <h2>Bestand</h2>
                    <button type="button" class="recipe-toolbar-toggle-button" onclick="toggleInventoryAddPanel()" title="Lebensmittel hinzufügen" aria-label="Lebensmittel hinzufügen">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>

                <div class="recipe-book-controls inventory-controls">
                    <input type="text" id="inventory-search" class="recipe-search-input" placeholder="Inventar durchsuchen ...">
                </div>

                <div id="inventory-list" class="inventory-list inventory-list-detailed"></div>
            </section>
        </main>
    </div>

    <div id="inventory-add-panel" class="inventory-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="inventory-add-title">
        <div class="inventory-modal-backdrop" onclick="toggleInventoryAddPanel(false)"></div>
        <section class="inventory-modal-dialog inventory-add-dialog inventory-form-card">
                <div class="inventory-section-headline">
                    <div>
                        <p class="recipe-kicker">Neuer Bestand</p>
                        <h2 id="inventory-add-title">Lebensmittel hinzufügen</h2>
                    </div>
                    <button type="button" class="header-icon-button" onclick="toggleInventoryAddPanel(false)" title="Erfassung schließen" aria-label="Erfassung schließen">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                    </button>
                </div>

                <form id="inventory-form" class="inventory-create-form">
                    <section class="inventory-create-section inventory-create-section-name">
                        <div class="form-section inventory-name-field">
                            <label for="inventory-name">Lebensmittel</label>
                            <input type="text" id="inventory-name" list="inventory-name-suggestions" placeholder="z.B. Erbsen" autocomplete="off">
                            <datalist id="inventory-name-suggestions"></datalist>
                        </div>
                    </section>

                    <section class="inventory-create-section inventory-create-stock-section">
                        <label class="inventory-create-type">
                            <input type="radio" name="inventory-stock-type" value="package" checked onchange="updateInventoryStockType()">
                            <span>
                                <strong>Einheiten</strong>
                                <small>z.B. 2 × 230 g</small>
                            </span>
                        </label>

                        <div id="inventory-package-fields" class="inventory-create-grid inventory-create-grid-package">
                            <div class="form-section">
                                <label for="inventory-package-count">Anzahl Einheiten</label>
                                <input type="number" id="inventory-package-count" min="1" step="1" inputmode="numeric" pattern="[0-9]*" data-integer-only="true" placeholder="z.B. 2">
                            </div>
                            <div class="form-section">
                                <label for="inventory-unit-weight">Inhalt je Einheit</label>
                                <input type="number" id="inventory-unit-weight" min="0" step="0.1" placeholder="z.B. 230">
                            </div>
                            <div class="form-section">
                                <label for="inventory-measure-unit-package">Einheit</label>
                                <select id="inventory-measure-unit-package" aria-label="Mengeneinheit">
                                    <option value="g">g</option>
                                    <option value="ml">ml</option>
                                    <option value="Stk.">Stk.</option>
                                </select>
                            </div>
                            <div class="form-section">
                                <label for="inventory-package-location">Lagerort</label>
                                <select id="inventory-package-location">
                                    <option value="">Bitte wählen</option>
                                    <option value="TK">TK</option>
                                    <option value="KS">KS</option>
                                    <option value="TK (Keller)">TK (Keller)</option>
                                    <option value="KS (Keller)">KS (Keller)</option>
                                    <option value="Vorratsraum">Vorratsraum</option>
                                </select>
                            </div>
                            <div class="form-section">
                                <label for="inventory-package-expiry">Ablaufdatum</label>
                                <div class="inventory-date-input-row">
                                    <input type="date" id="inventory-package-expiry">
                                    <div class="inventory-date-actions" aria-label="Datumsaktionen">
                                        <button type="button" class="secondary-button inventory-date-button" onclick="setDateToday('inventory-package-expiry')">Heute</button>
                                        <button type="button" class="secondary-button inventory-date-button" onclick="clearDateInput('inventory-package-expiry')">Leeren</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="inventory-create-section inventory-create-stock-section">
                        <label class="inventory-create-type">
                            <input type="radio" name="inventory-stock-type" value="loose" onchange="updateInventoryStockType()">
                            <span>
                                <strong>Freie Menge</strong>
                                <small>z.B. 300 g, 500 ml oder 4 Stk.</small>
                            </span>
                        </label>

                        <div id="inventory-loose-fields" class="inventory-create-grid inventory-create-grid-loose is-muted">
                            <div class="form-section">
                                <label for="inventory-loose-amount">Freie Menge</label>
                                <input type="number" id="inventory-loose-amount" min="0" step="0.1" placeholder="z.B. 300">
                            </div>
                            <div class="form-section">
                                <label for="inventory-measure-unit-loose">Einheit</label>
                                <select id="inventory-measure-unit-loose" aria-label="Mengeneinheit">
                                    <option value="g">g</option>
                                    <option value="ml">ml</option>
                                    <option value="Stk.">Stk.</option>
                                </select>
                            </div>
                            <div class="form-section">
                                <label for="inventory-loose-location">Lagerort</label>
                                <select id="inventory-loose-location">
                                    <option value="">Bitte wählen</option>
                                    <option value="TK">TK</option>
                                    <option value="KS">KS</option>
                                    <option value="TK (Keller)">TK (Keller)</option>
                                    <option value="KS (Keller)">KS (Keller)</option>
                                    <option value="Vorratsraum">Vorratsraum</option>
                                </select>
                            </div>
                            <div class="form-section">
                                <label for="inventory-loose-expiry">Ablaufdatum</label>
                                <div class="inventory-date-input-row">
                                    <input type="date" id="inventory-loose-expiry">
                                    <div class="inventory-date-actions" aria-label="Datumsaktionen">
                                        <button type="button" class="secondary-button inventory-date-button" onclick="setDateToday('inventory-loose-expiry')">Heute</button>
                                        <button type="button" class="secondary-button inventory-date-button" onclick="clearDateInput('inventory-loose-expiry')">Leeren</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div class="form-actions inventory-actions">
                        <button type="button" class="secondary-button" onclick="resetInventoryForm(); toggleInventoryAddPanel(false);">Abbrechen</button>
                        <button type="button" onclick="saveInventoryItem()">Speichern</button>
                    </div>
                </form>
        </section>
    </div>

    <div id="inventory-edit-modal" class="inventory-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="inventory-edit-title">
        <div class="inventory-modal-backdrop" onclick="closeInventoryEditModal()"></div>
        <div class="inventory-modal-dialog">
            <div class="inventory-section-headline">
                <h2 id="inventory-edit-title">Lebensmittel bearbeiten</h2>
                <button type="button" class="header-icon-button" onclick="closeInventoryEditModal()" title="Fenster schließen" aria-label="Fenster schließen">
                    <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="inventory-edit-form">
                <input type="hidden" id="edit-inventory-id">
                <div class="inventory-form-grid">
                    <div class="form-section">
                        <label for="edit-inventory-name">Bezeichnung</label>
                        <input type="text" id="edit-inventory-name">
                    </div>
                    <div class="form-section">
                        <label for="edit-inventory-unit">Standard-Einheit</label>
                        <input type="text" id="edit-inventory-unit" placeholder="z.B. g">
                    </div>
                </div>
                <div class="form-actions inventory-actions">
                    <button type="button" class="secondary-button" onclick="closeInventoryEditModal()">Abbrechen</button>
                    <button type="button" onclick="saveEditedInventoryItem()">Speichern</button>
                </div>
            </form>
        </div>
    </div>


    <div id="inventory-position-modal" class="inventory-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="inventory-position-title">
        <div class="inventory-modal-backdrop" onclick="closeInventoryPositionModal()"></div>
        <div class="inventory-modal-dialog inventory-position-dialog">
            <div class="inventory-section-headline">
                <div>
                    <p id="inventory-position-kicker" class="recipe-kicker">Bestandsposition</p>
                    <h2 id="inventory-position-title">Position anpassen</h2>
                </div>
                <button type="button" class="header-icon-button" onclick="closeInventoryPositionModal()" title="Fenster schließen" aria-label="Fenster schließen">
                    <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <form id="inventory-position-form">
                <input type="hidden" id="position-item-id">
                <input type="hidden" id="position-profile-key">
                <input type="hidden" id="position-mode">
                <input type="hidden" id="position-action">

                <div id="position-current-summary" class="inventory-position-summary"></div>

                <div id="position-amount-fields" class="inventory-form-grid inventory-form-grid-compact">
                    <div class="form-section">
                        <label for="position-amount">Hinzufügen</label>
                        <input type="number" id="position-amount" min="0" step="0.1" placeholder="Menge">
                    </div>
                    <div class="form-section">
                        <label for="position-unit-weight">Inhalt je Einheit</label>
                        <input type="number" id="position-unit-weight" min="0" step="0.1" placeholder="z.B. 230">
                    </div>
                    <div class="form-section">
                        <label for="position-measure-unit">Einheit</label>
                        <select id="position-measure-unit">
                            <option value="g">g</option>
                            <option value="ml">ml</option>
                            <option value="Stk.">Stk.</option>
                        </select>
                    </div>
                </div>

                <div class="inventory-form-grid inventory-form-grid-compact">
                    <div class="form-section">
                        <label for="position-location">Lagerort</label>
                        <select id="position-location">
                            <option value="">Bitte wählen</option>
                            <option value="TK">TK</option>
                            <option value="KS">KS</option>
                            <option value="TK (Keller)">TK (Keller)</option>
                            <option value="KS (Keller)">KS (Keller)</option>
                            <option value="Vorratsraum">Vorratsraum</option>
                        </select>
                    </div>
                    <div class="form-section">
                        <label for="position-expiry">Ablaufdatum</label>
                        <div class="inventory-date-input-row">
                            <input type="date" id="position-expiry">
                            <div class="inventory-date-actions" aria-label="Datumsaktionen">
                                <button type="button" class="secondary-button inventory-date-button" onclick="setDateToday('position-expiry')">Heute</button>
                                <button type="button" class="secondary-button inventory-date-button" onclick="clearDateInput('position-expiry')">Leeren</button>
                            </div>
                        </div>
                    </div>
                </div>

                <p id="position-modal-hint" class="inventory-adjust-hint"></p>

                <div class="form-actions inventory-actions">
                    <button type="button" class="secondary-button" onclick="closeInventoryPositionModal()">Abbrechen</button>
                    <button type="button" onclick="submitInventoryPositionModal()">Speichern</button>
                </div>
            </form>
        </div>
    </div>


    <div id="app-toast" class="app-toast is-hidden"></div>
    <script src="navigation.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
