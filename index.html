<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f7fb">
</head>
<body>
    <header class="app-header">
        <div class="app-header-inner">
            <button id="burger-button" class="burger-button" type="button" aria-label="Menü öffnen">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                </span>
            </button>

            <div class="app-header-title">Food Calculator</div>

            <div id="burger-dropdown" class="burger-dropdown is-hidden">
                <a href="/index.html">Startseite</a>
                <a href="/recipeCreate.html">Neues Rezept</a>
                <a href="/index.html#recipe-book">Rezeptbuch</a>
                <a href="/index.html#meal-plan">Wochenplan</a>
            </div>
        </div>
    </header>

    <div class="container">
<main class="page-content">
            <section id="meal-plan" class="section-card">
                <div class="meal-plan-topbar">
                    <div class="meal-plan-title-group">
                        <h2>Wochenplan</h2>
                        <select id="plan-list" class="toolbar-plan-select"></select>
                        <p id="current-plan-name">Aktueller Wochenplan: keiner</p>
                    </div>

                    <div class="meal-plan-current-actions">
                        <button type="button" class="toolbar-icon-button toolbar-shopping-button" onclick="shareWeeklyShoppingList()" title="Einkaufsliste teilen" aria-label="Einkaufsliste teilen"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 8.5H8L6 3H3"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg></span></button>
                        <button type="button" class="toolbar-icon-button toolbar-update-button" onclick="updateMealPlan()" title="Plan aktualisieren" aria-label="Plan aktualisieren"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18 2v5h-5"/><path d="M6 22v-5h5"/></svg></span></button>
                        <button type="button" class="toolbar-icon-button toolbar-delete-button" onclick="deleteMealPlan()" title="Plan löschen" aria-label="Plan löschen"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg></span></button>
                        <button type="button" class="toolbar-icon-button toolbar-toggle-save-button" onclick="togglePlanSaveToolbar()" title="Neuen Plan anlegen" aria-label="Neuen Plan anlegen"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span></button>
                    </div>
                </div>

                <div id="plan-save-panel" class="plan-save-panel is-hidden">
                    <div class="meal-plan-save-inline">
                        <input type="text" id="plan-name" class="toolbar-plan-name" placeholder="Neuen Plan speichern als">
                        <button type="button" class="toolbar-icon-button toolbar-save-button" onclick="saveMealPlan()" title="Neuen Plan speichern" aria-label="Neuen Plan speichern"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5z"/><path d="M8 3v6h8V3"/><path d="M8 21v-7h8v7"/></svg></span></button>
                    </div>
                </div>

                <div class="weekly-plan-board" id="meal-table"></div>
                <div id="day-detail-panel" class="day-detail-panel"></div>
            </section>

            <section class="recipe-book-box section-card">
                <div id="recipe-book">
                    <div class="recipe-book-topbar">
                        <h2>Rezeptbuch</h2>
                        <button type="button" class="recipe-toolbar-toggle-button" onclick="toggleRecipeToolbar()" title="Rezept hinzufügen" aria-label="Rezept hinzufügen"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span></button>
                    </div>

                    <div id="recipe-add-panel" class="recipe-add-panel is-hidden">
                        <div class="recipe-book-toolbar">
                            <div class="recipe-checkboxes recipe-toolbar-checkboxes">
                                <label><input type="checkbox" value="breakfast"> Frühstück</label>
                                <label><input type="checkbox" value="lunch"> Mittagessen</label>
                                <label><input type="checkbox" value="dinner"> Abendessen</label>
                                <label><input type="checkbox" value="snack"> Snack</label>
                            </div>
                            <input type="text" id="recipe-name" class="recipe-toolbar-name" placeholder="Rezeptname">
                            <input type="text" id="recipe-calories" class="recipe-toolbar-calories" placeholder="Kalorien" inputmode="numeric" pattern="[0-9]*">
                            <input type="number" id="recipe-portions" class="recipe-toolbar-portions" placeholder="Portionen" min="1" step="1">
                            <button type="button" class="recipe-toolbar-save-button" onclick="addRecipe()" title="Rezept speichern" aria-label="Rezept speichern"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5z"/><path d="M8 3v6h8V3"/><path d="M8 21v-7h8v7"/></svg></span></button>
                        </div>
                    </div>

                    <div class="recipe-book-controls">
                        <input type="text" id="recipe-search" class="recipe-search-input" placeholder="Rezepte durchsuchen ...">
                        <select id="recipe-sort" class="recipe-sort-select">
                            <option value="name-asc">Name A–Z</option>
                            <option value="name-desc">Name Z–A</option>
                            <option value="favorites">Favoriten</option>
                            <option value="breakfast">Nur Frühstück</option>
                            <option value="lunch">Nur Mittagessen</option>
                            <option value="dinner">Nur Abendessen</option>
                            <option value="snack">Nur Snack</option>
                        </select>
                    </div>

                    <ul id="recipe-list"></ul>
                </div>
            </section>
        </main>
    
    </div>

    <div id="app-toast" class="app-toast is-hidden"></div>
    <script src="navigation.js"></script>
    <script src="script.js"></script>
</body>
</html>
