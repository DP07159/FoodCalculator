<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f7fb">
</head>
<body>
    <header class="app-header">
        <button id="burger-button" class="burger-button" type="button" aria-label="Menü öffnen">
            <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>

        <div class="app-header-title">Food Calculator</div>

        <div id="burger-dropdown" class="burger-dropdown is-hidden"></div>
    </header>

    <div class="container">
        <main class="page-content inventory-page">
            <header class="page-header inventory-header">
                <p class="recipe-kicker">Bestand</p>
                <h1>Inventar</h1>
            </header>

            <section id="inventory-add-panel" class="section-card inventory-form-card is-hidden">
                <div class="inventory-section-headline">
                    <h2>Lebensmittel erfassen</h2>
                    <button type="button" class="header-icon-button" onclick="toggleInventoryAddPanel(false)" title="Erfassung schließen" aria-label="Erfassung schließen">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                    </button>
                </div>

                <form id="inventory-form">
                    <div class="inventory-form-grid">
                        <div class="form-section">
                            <label for="inventory-name">Bezeichnung</label>
                            <input type="text" id="inventory-name" placeholder="z.B. Butter">
                        </div>

                        <div class="form-section">
                            <label for="inventory-quantity">Menge</label>
                            <input type="number" id="inventory-quantity" min="0" step="0.1" placeholder="z.B. 2">
                        </div>

                        <div class="form-section">
                            <label for="inventory-unit">Einheit</label>
                            <input type="text" id="inventory-unit" placeholder="z.B. Stück, Packung, g">
                        </div>

                        <div class="form-section">
                            <label for="inventory-weight">Gewicht</label>
                            <input type="number" id="inventory-weight" min="0" step="0.1" placeholder="optional">
                        </div>

                        <div class="form-section">
                            <label for="inventory-expiry">Ablaufdatum</label>
                            <input type="date" id="inventory-expiry">
                        </div>

                        <div class="form-section">
                            <label for="inventory-location">Aufbewahrungsort</label>
                            <select id="inventory-location">
                                <option value="">Bitte wählen</option>
                                <option value="TK">TK</option>
                                <option value="KS">KS</option>
                                <option value="TK (Keller)">TK (Keller)</option>
                                <option value="KS (Keller)">KS (Keller)</option>
                                <option value="Vorratsraum">Vorratsraum</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="inventory-notes">Notizen</label>
                        <textarea id="inventory-notes" rows="1" placeholder="optional"></textarea>
                    </div>

                    <div class="form-actions inventory-actions">
                        <button type="button" class="secondary-button" onclick="resetInventoryForm(); toggleInventoryAddPanel(false);">Abbrechen</button>
                        <button type="button" onclick="saveInventoryItem()">Speichern</button>
                    </div>
                </form>
            </section>

            <section class="section-card inventory-list-card">
                <div class="recipe-book-topbar inventory-list-topbar">
                    <h2>Bestand</h2>
                    <button type="button" class="recipe-toolbar-toggle-button" onclick="toggleInventoryAddPanel()" title="Lebensmittel hinzufügen" aria-label="Lebensmittel hinzufügen">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>

                <div class="recipe-book-controls inventory-controls">
                    <input type="text" id="inventory-search" class="recipe-search-input" placeholder="Inventar durchsuchen ...">
                </div>

                <div id="inventory-list" class="inventory-list"></div>
            </section>
        </main>
    </div>

    <div id="inventory-edit-modal" class="inventory-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="inventory-edit-title">
        <div class="inventory-modal-backdrop" onclick="closeInventoryEditModal()"></div>
        <div class="inventory-modal-dialog">
            <div class="inventory-section-headline">
                <h2 id="inventory-edit-title">Lebensmittel bearbeiten</h2>
                <button type="button" class="header-icon-button" onclick="closeInventoryEditModal()" title="Fenster schließen" aria-label="Fenster schließen">
                    <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <form id="inventory-edit-form">
                <input type="hidden" id="edit-inventory-id">

                <div class="inventory-form-grid">
                    <div class="form-section">
                        <label for="edit-inventory-name">Bezeichnung</label>
                        <input type="text" id="edit-inventory-name">
                    </div>

                    <div class="form-section">
                        <label for="edit-inventory-quantity">Menge</label>
                        <input type="number" id="edit-inventory-quantity" min="0" step="0.1">
                    </div>

                    <div class="form-section">
                        <label for="edit-inventory-unit">Einheit</label>
                        <input type="text" id="edit-inventory-unit">
                    </div>

                    <div class="form-section">
                        <label for="edit-inventory-weight">Gewicht</label>
                        <input type="number" id="edit-inventory-weight" min="0" step="0.1">
                    </div>

                    <div class="form-section">
                        <label for="edit-inventory-expiry">Ablaufdatum</label>
                        <input type="date" id="edit-inventory-expiry">
                    </div>

                    <div class="form-section">
                        <label for="edit-inventory-location">Aufbewahrungsort</label>
                        <select id="edit-inventory-location">
                            <option value="">Bitte wählen</option>
                            <option value="TK">TK</option>
                            <option value="KS">KS</option>
                            <option value="TK (Keller)">TK (Keller)</option>
                            <option value="KS (Keller)">KS (Keller)</option>
                            <option value="Vorratsraum">Vorratsraum</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <label for="edit-inventory-notes">Notizen</label>
                    <textarea id="edit-inventory-notes" rows="1"></textarea>
                </div>

                <div class="form-actions inventory-actions">
                    <button type="button" class="secondary-button" onclick="closeInventoryEditModal()">Abbrechen</button>
                    <button type="button" onclick="saveEditedInventoryItem()">Änderungen speichern</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-toast" class="app-toast is-hidden"></div>
    <script src="navigation.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
