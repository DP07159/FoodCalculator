<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f7fb">
</head>
<body>
    <header class="app-header">
        <button id="burger-button" class="burger-button" type="button" aria-label="Menü öffnen">
            <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
        <div class="app-header-title">Food Calculator</div>
        <div id="burger-dropdown" class="burger-dropdown is-hidden"></div>
    </header>

    <div class="container">
        <main class="page-content inventory-page">
            <header class="page-header inventory-header">
                <p class="recipe-kicker">Bestand</p>
                <h1>Inventar</h1>
            </header>

            <section id="inventory-add-panel" class="section-card inventory-form-card is-hidden">
                <div class="inventory-section-headline">
                    <div>
                        <p class="recipe-kicker">Bestand erhöhen</p>
                        <h2>Lebensmittel erfassen</h2>
                    </div>
                    <button type="button" class="header-icon-button" onclick="toggleInventoryAddPanel(false)" title="Erfassung schließen" aria-label="Erfassung schließen">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                    </button>
                </div>

                <form id="inventory-form">
                    <div class="inventory-form-grid">
                        <div class="form-section inventory-name-field">
                            <label for="inventory-name">Lebensmittel</label>
                            <input type="text" id="inventory-name" list="inventory-name-suggestions" placeholder="z.B. Erbsen" autocomplete="off">
                            <datalist id="inventory-name-suggestions"></datalist>
                        </div>
                        <div class="form-section">
                            <label for="inventory-location">Aufbewahrungsort</label>
                            <select id="inventory-location">
                                <option value="">Bitte wählen</option>
                                <option value="TK">TK</option>
                                <option value="KS">KS</option>
                                <option value="TK (Keller)">TK (Keller)</option>
                                <option value="KS (Keller)">KS (Keller)</option>
                                <option value="Vorratsraum">Vorratsraum</option>
                            </select>
                        </div>
                        <div class="form-section">
                            <label for="inventory-expiry">Ablaufdatum</label>
                            <input type="date" id="inventory-expiry">
                        </div>
                    </div>

                    <div class="inventory-choice-row" role="group" aria-label="Bestandsart auswählen">
                        <label class="inventory-choice-card">
                            <input type="radio" name="inventory-stock-type" value="package" checked onchange="updateInventoryStockType()">
                            <span>Packungseinheiten</span>
                            <small>z.B. 2 Dosen à 230 g</small>
                        </label>
                        <label class="inventory-choice-card">
                            <input type="radio" name="inventory-stock-type" value="loose" onchange="updateInventoryStockType()">
                            <span>Freie Menge</span>
                            <small>z.B. 300 g, 500 ml oder 4 Stk.</small>
                        </label>
                    </div>

                    <div id="inventory-package-fields" class="inventory-form-grid">
                        <div class="form-section">
                            <label for="inventory-package-count">Anzahl Packungseinheiten</label>
                            <input type="number" id="inventory-package-count" min="1" step="1" placeholder="z.B. 2">
                        </div>
                        <div class="form-section">
                            <label for="inventory-unit-label">Packungseinheit</label>
                            <input type="text" id="inventory-unit-label" placeholder="z.B. Dose, Glas, Packung">
                        </div>
                        <div class="form-section">
                            <label for="inventory-unit-weight">Inhalt je Einheit</label>
                            <div class="inventory-inline-inputs">
                                <input type="number" id="inventory-unit-weight" min="0" step="0.1" placeholder="z.B. 230">
                                <select id="inventory-measure-unit-package" aria-label="Mengeneinheit">
                                    <option value="g">g</option>
                                    <option value="ml">ml</option>
                                    <option value="Stk.">Stk.</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="inventory-loose-fields" class="inventory-form-grid is-hidden">
                        <div class="form-section">
                            <label for="inventory-loose-amount">Freie Menge</label>
                            <div class="inventory-inline-inputs">
                                <input type="number" id="inventory-loose-amount" min="0" step="0.1" placeholder="z.B. 300">
                                <select id="inventory-measure-unit-loose" aria-label="Mengeneinheit">
                                    <option value="g">g</option>
                                    <option value="ml">ml</option>
                                    <option value="Stk.">Stk.</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="inventory-notes">Notizen</label>
                        <textarea id="inventory-notes" rows="1" placeholder="optional"></textarea>
                    </div>

                    <div class="form-actions inventory-actions">
                        <button type="button" class="secondary-button" onclick="resetInventoryForm(); toggleInventoryAddPanel(false);">Abbrechen</button>
                        <button type="button" onclick="saveInventoryItem()">Speichern</button>
                    </div>
                </form>
            </section>

            <section class="section-card inventory-list-card">
                <div class="recipe-book-topbar inventory-list-topbar">
                    <h2>Bestand</h2>
                    <button type="button" class="recipe-toolbar-toggle-button" onclick="toggleInventoryAddPanel()" title="Lebensmittel hinzufügen" aria-label="Lebensmittel hinzufügen">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>

                <div class="recipe-book-controls inventory-controls">
                    <input type="text" id="inventory-search" class="recipe-search-input" placeholder="Inventar durchsuchen ...">
                </div>

                <div id="inventory-list" class="inventory-list"></div>
            </section>
        </main>
    </div>

    <div id="inventory-edit-modal" class="inventory-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="inventory-edit-title">
        <div class="inventory-modal-backdrop" onclick="closeInventoryEditModal()"></div>
        <div class="inventory-modal-dialog">
            <div class="inventory-section-headline">
                <h2 id="inventory-edit-title">Lebensmittel bearbeiten</h2>
                <button type="button" class="header-icon-button" onclick="closeInventoryEditModal()" title="Fenster schließen" aria-label="Fenster schließen">
                    <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="inventory-edit-form">
                <input type="hidden" id="edit-inventory-id">
                <div class="inventory-form-grid">
                    <div class="form-section">
                        <label for="edit-inventory-name">Bezeichnung</label>
                        <input type="text" id="edit-inventory-name">
                    </div>
                    <div class="form-section">
                        <label for="edit-inventory-unit">Standard-Einheit</label>
                        <input type="text" id="edit-inventory-unit" placeholder="z.B. g">
                    </div>
                </div>
                <div class="form-section">
                    <label for="edit-inventory-notes">Notizen</label>
                    <textarea id="edit-inventory-notes" rows="1"></textarea>
                </div>
                <div class="form-actions inventory-actions">
                    <button type="button" class="secondary-button" onclick="closeInventoryEditModal()">Abbrechen</button>
                    <button type="button" onclick="saveEditedInventoryItem()">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <div id="inventory-adjust-modal" class="inventory-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="inventory-adjust-title">
        <div class="inventory-modal-backdrop" onclick="closeInventoryAdjustModal()"></div>
        <div class="inventory-modal-dialog">
            <div class="inventory-section-headline">
                <div>
                    <h2 id="inventory-adjust-title">Bestand anpassen</h2>
                    <p id="adjust-inventory-name" class="inventory-modal-subtitle"></p>
                </div>
                <button type="button" class="header-icon-button" onclick="closeInventoryAdjustModal()" title="Fenster schließen" aria-label="Fenster schließen">
                    <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <form id="inventory-adjust-form">
                <input type="hidden" id="adjust-inventory-id">
                <p id="adjust-inventory-current" class="inventory-current-stock"></p>

                <div class="inventory-adjust-direction" role="group" aria-label="Aktion auswählen">
                    <button type="button" id="adjust-action-add" class="inventory-action-toggle is-active" onclick="setAdjustmentAction('add')">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                        Erhöhen
                    </button>
                    <button type="button" id="adjust-action-remove" class="inventory-action-toggle" onclick="setAdjustmentAction('remove')">
                        <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/></svg>
                        Reduzieren
                    </button>
                </div>

                <input type="hidden" id="adjust-inventory-action" value="add">

                <div class="form-section">
                    <label for="adjust-inventory-mode">Anpassung</label>
                    <select id="adjust-inventory-mode" onchange="updateAdjustmentMode()">
                        <option value="package">Packungseinheiten</option>
                        <option value="loose">Freie Menge</option>
                        <option value="auto">Entnahmemenge automatisch verrechnen</option>
                    </select>
                </div>

                <div id="adjust-package-fields" class="inventory-form-grid">
                    <div class="form-section" id="adjust-package-profile-section">
                        <label for="adjust-package-profile">Vorhandene Packungseinheit</label>
                        <select id="adjust-package-profile"></select>
                    </div>
                    <div class="form-section" id="adjust-package-label-section">
                        <label for="adjust-unit-label">Packungseinheit</label>
                        <input type="text" id="adjust-unit-label" placeholder="z.B. Dose">
                    </div>
                    <div class="form-section">
                        <label for="adjust-inventory-amount">Anzahl</label>
                        <input type="number" id="adjust-inventory-amount" min="0" step="1" placeholder="z.B. 1" oninput="updateAdjustmentPreview()">
                    </div>
                    <div class="form-section" id="adjust-unit-weight-section">
                        <label for="adjust-unit-weight">Inhalt je Einheit</label>
                        <div class="inventory-inline-inputs">
                            <input type="number" id="adjust-unit-weight" min="0" step="0.1" placeholder="z.B. 230" oninput="updateAdjustmentPreview()">
                            <select id="adjust-measure-unit-package" onchange="updateAdjustmentPreview()">
                                <option value="g">g</option>
                                <option value="ml">ml</option>
                                <option value="Stk.">Stk.</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="adjust-loose-fields" class="inventory-form-grid is-hidden">
                    <div class="form-section">
                        <label for="adjust-loose-amount">Menge</label>
                        <div class="inventory-inline-inputs">
                            <input type="number" id="adjust-loose-amount" min="0" step="0.1" placeholder="z.B. 100" oninput="updateAdjustmentPreview()">
                            <select id="adjust-measure-unit-loose" onchange="updateAdjustmentPreview()">
                                <option value="g">g</option>
                                <option value="ml">ml</option>
                                <option value="Stk.">Stk.</option>
                            </select>
                        </div>
                    </div>
                </div>

                <p id="adjust-inventory-hint" class="inventory-adjust-hint"></p>
                <p id="adjust-inventory-preview" class="inventory-adjust-preview"></p>

                <div class="form-actions inventory-actions">
                    <button type="button" class="secondary-button" onclick="closeInventoryAdjustModal()">Abbrechen</button>
                    <button type="button" onclick="submitInventoryAdjustment()">Übernehmen</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-toast" class="app-toast is-hidden"></div>
    <script src="navigation.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
