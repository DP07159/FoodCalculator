<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochanleitung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="home-button">
            <a href="/index.html">🏠 Home</a>
        </div>

        <main class="page-content recipe-instructions-page">

            <header class="header-container">
                <div class="recipe-info">
                    <h2 id="display-recipe-name"></h2>
                </div>

                <div class="portion-calories">
                    <div>🍽️ <span id="display-recipe-portions"></span></div>
                    <div>🍫 <span id="display-recipe-calories"></span></div>
                </div>
            </header>

            <section class="content-section">
                <h3>Zutaten</h3>
                <ul id="display-recipe-ingredients"></ul>
            </section>

            <section class="content-section">
                <h3>Anleitung</h3>
                <div id="display-recipe-instructions"></div>
            </section>

        </main>
    </div>

    <script src="recipeInstructions.js"></script>
</body>
</html>
