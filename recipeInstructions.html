<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochanleitung</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f7fb">
</head>
<body>
    <header class="app-header">
        <button id="burger-button" class="burger-button" type="button" aria-label="Menü öffnen">
            <svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>

        <div class="app-header-title">Food Calculator</div>

        <div id="burger-dropdown" class="burger-dropdown is-hidden">
            <a href="/index.html">Startseite</a>
            <a href="/recipeCreate.html">Neues Rezept</a>
            <a href="/index.html#recipe-book">Rezeptbuch</a>
            <a href="/index.html#meal-plan">Wochenplan</a>
        </div>
    </header>

    <div class="container">
        <main class="page-content recipe-instructions-page">
            <header class="header-container recipe-hero">
                <div class="recipe-info">
                    <p class="recipe-kicker">Rezept</p>
                    <h1 id="display-recipe-name"></h1>
                </div>
                <div class="recipe-header-actions">
                    <div class="recipe-stat"><span class="recipe-stat-icon"><svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="12" r="6"/><circle cx="11" cy="12" r="3"/><path d="M20 4v16"/></svg></span><span id="display-recipe-portions"></span></div>
                    <div class="recipe-stat"><span class="recipe-stat-icon"><svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22c4 0 7-2.7 7-6.8 0-2.6-1.5-5.1-4.4-7.5.1 2.1-.7 3.5-2.1 4.2.2-3.3-1.3-6-4.1-8.1.2 3.6-3.4 5.6-3.4 11.2C5 19.3 8 22 12 22z"/></svg></span><span id="display-recipe-calories"></span></div>
                    <button type="button" id="favorite-recipe-button" class="header-icon-button favorite-header-button" title="Als Favorit markieren" aria-label="Als Favorit markieren"><svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 0 0 0-7.8z"/></svg></button>
                    <button type="button" id="share-ingredients-button" class="header-icon-button" title="Zutatenliste teilen" aria-label="Zutatenliste teilen"><svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M20 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h5"/></svg></button>
                    <button type="button" id="edit-recipe-button" class="header-icon-button" title="Rezept bearbeiten" aria-label="Rezept bearbeiten"><svg class="fc-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16z"/><path d="M13.5 6.5l4 4"/></svg></button>
                </div>
            </header>

            <section class="content-section ingredients-content-section">
                <h2>Zutaten</h2>
                <ul id="display-recipe-ingredients"></ul>
            </section>

            <section class="content-section instructions-content-section">
                <h2>Anleitung</h2>
                <div id="display-recipe-instructions"></div>
            </section>
        </main>
    </div>

    <div id="app-toast" class="app-toast is-hidden"></div>
    <script src="navigation.js"></script>
    <script src="recipeInstructions.js"></script>
</body>
</html>
